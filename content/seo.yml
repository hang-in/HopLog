# --- Search Engine Optimization (SEO) ---
siteUrl: "https://example.com"
keywords:
  - "Engineering"
  - "Software Architecture"
  - "Minimalism"
  - "Next.js"
  - "Bun"
  - "Developer Experience"
language: "ko-KR"
robots:
  policy: "index, follow"
  rules:
    - userAgent: "*"
      allow: "/"
      disallow: []
      crawlDelay: 1
    - userAgent: "GPTBot"
      allow: "/"
    - userAgent: "ChatGPT-User"
      allow: "/"
    - userAgent: "OAI-SearchBot"
      allow: "/"
    - userAgent: "ClaudeBot"
      allow: "/"
    - userAgent: "PerplexityBot"
      allow: "/"
    - userAgent: "Googlebot"
      allow: "/"
    - userAgent: "Google-Extended"
      allow: "/"
    - userAgent: "Bingbot"
      allow: "/"
    - userAgent: "Slurp"
      allow: "/"
    - userAgent: "DuckDuckBot"
      allow: "/"
    - userAgent: "Yeti"
      allow: "/"

# --- Open Graph (OG) ---
openGraph:
  type: "website"
  siteName: "HopLog"
  title: "HopLog | A simple blog built for developers."
  description: "A minimalist, high-performance blog engine for software craftsmen."
  image: "/banner.webp"
  imageWidth: 1200
  imageHeight: 600

# --- Twitter Cards ---
twitter:
  card: "summary_large_image"
  site: "@hoplog"
  creator: "@hoplog"
  image: "/banner.webp"
