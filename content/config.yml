# HopLog Global Configuration

# --- Site Metadata ---
site:
  title: "HopLog"
  description: "A developer-friendly blog built for writing, organizing, and publishing technical posts."
  titleTemplate: "%s | HopLog"

faq:
  enabled: true

performance:
  postsCacheTtlSeconds: 60

# --- Hero Banner ---
hero:
  title: 'A simple blog<br />for <span class="text-primary">developers</span>'
  description: "Write technical posts in Markdown, organize them cleanly, and publish them with a fast, developer-friendly workflow."
  background:
    image: "/api/images/hero-bg.webp"
    opacity: 0.12

# --- Typography ---
typography:
  lineHeight: 1.15
  fontFamily: ""
  fontUrl: ""
