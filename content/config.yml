# HopLog Global Configuration

# --- Site Metadata ---
site:
  title: "HopLog"
  description: "A developer-friendly blog built for writing, organizing, and publishing technical posts."
  titleTemplate: "%s | HopLog"

faq:
  enabled: true

performance:
  postsCacheTtlSeconds: 60

search:
  provider: "local"
  meilisearch:
    hostEnv: "MEILISEARCH_HOST"
    searchKeyEnv: "MEILISEARCH_SEARCH_KEY"
    adminKeyEnv: "MEILISEARCH_ADMIN_KEY"
    indexName: "posts"

# --- Hero Banner ---
hero:
  title: 'A simple blog<br />for <span class="text-primary">developers</span>'
  description: "Write technical posts in Markdown, organize them cleanly, and publish them with a fast, developer-friendly workflow."
  background:
    image: "/api/images/hero-bg.webp"
    opacity: 0.12

# --- Typography ---
typography:
  lineHeight: 1.15
  fontFamily: ""
  fontUrl: ""

# --- Comments (Giscus) ---
# To enable, set enabled: true and fill in your GitHub repo details.
# Get repoId and categoryId from https://giscus.app
comments:
  enabled: false
  giscus:
    repo: "" # GitHub repo (e.g. "owner/repo")
    repoId: "" # GitHub GraphQL repo ID
    category: "Announcements" # Discussion category name
    categoryId: "" # GitHub GraphQL category ID
    mapping: "pathname" # pathname | url | title | og:title | specific | number
    strict: false # Strict title matching
    reactionsEnabled: true # Show reactions on main post
    inputPosition: "top" # top | bottom
    lang: "" # Empty = sync with site locale (en, ko, ja, zh-CN)

analytics:
  enabled: false
  debug: false
  ga:
    enabled: false
    measurementIdEnv: "GA_MEASUREMENT_ID"
  metaPixel:
    enabled: false
    pixelIdEnv: "META_PIXEL_ID"
  sentry:
    enabled: false
    dsnEnv: "SENTRY_DSN"
    environmentEnv: "SENTRY_ENVIRONMENT"
    tracesSampleRate: 1
