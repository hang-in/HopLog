services:
  app:
    build:
      context: .
      platforms:
        - linux/amd64
        - linux/arm64
    image: rapidrabbit76/hoplog:latest
    ports:
      - "3000:3000"
    environment:
      - MEILISEARCH_HOST=http://meilisearch:7700
    volumes:
      - ${PWD}/blog:/app/content
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  # Optional: Meilisearch full-text search engine.
  # HopLog uses a built-in local index by default — this service is NOT required.
  # To enable, run: docker compose --profile search up -d
  meilisearch:
    image: getmeili/meilisearch:v1.14
    ports:
      - "7700:7700"
    environment:
      - MEILI_ENV=production
      - MEILI_MASTER_KEY=${MEILISEARCH_ADMIN_KEY:-your-secure-key-at-least-16-bytes}
    volumes:
      - meili_data:/meili_data
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    restart: unless-stopped
    profiles:
      - search

  # Sidecar: watches content/posts for changes and syncs to Meilisearch (~5 MB image).
  # Automatically enabled with the "search" profile.
  search-sync:
    build:
      context: ./sidecar/search-sync
      platforms:
        - linux/amd64
        - linux/arm64
    image: rapidrabbit76/hoplog-search-sync:latest
    environment:
      - CONTENT_DIR=/app/content
      - MEILISEARCH_HOST=http://meilisearch:7700
      - MEILISEARCH_ADMIN_KEY=${MEILISEARCH_ADMIN_KEY:-your-secure-key-at-least-16-bytes}
      - MEILISEARCH_INDEX=posts
      - SYNC_DEBOUNCE_MS=2000
    volumes:
      - ${PWD}/blog:/app/content:ro
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    depends_on:
      - meilisearch
    restart: unless-stopped
    profiles:
      - search

volumes:
  meili_data:
