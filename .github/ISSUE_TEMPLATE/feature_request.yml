name: Feature Request
description: Suggest a new idea or improvement for HopLog
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for HopLog? We'd love to hear it!
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the feature request.
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use Case / Motivation
      description: Why is this feature needed? What problem does it solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: A clear and concise description of what you want to happen.
